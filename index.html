<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMZA | Software Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-white: #ffffff;
            --gray-text: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* --- القسم الأول: نبذة عني --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            background: radial-gradient(circle at 70% 30%, #3a0000 0%, #0a0a0a 100%);
        }

        .hero-text {
            flex: 1;
            z-index: 2;
        }

        .hero-text h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .hero-text span {
            color: var(--primary-red);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        /* تأثير الكتابة التفاعلي */
        .typewriter {
            font-size: 1.5rem;
            color: var(--gray-text);
            min-height: 1.6em;
        }

        .hero-img {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* الصورة وتأثير الحركة */
        .profile-container {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 5px solid var(--primary-red);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            animation: float 4s ease-in-out infinite;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- القسم الثاني: خدماتي --- */
        .services {
            padding: 80px 10%;
            text-align: center;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 50px;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 80px;
            height: 4px;
            background: var(--primary-red);
            position: absolute;
            bottom: -10px;
            right: 50%;
            transform: translateX(50%);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .service-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-red);
            background: #252525;
            box-shadow: 0 10px 30px rgba(255, 0, 0, 0.1);
        }

        .service-card i {
            font-size: 2.5rem;
            color: var(--primary-red);
            margin-bottom: 15px;
        }

        /* --- القسم الثالث: التواصل --- */
        .contact {
            padding: 80px 10%;
            text-align: center;
            background: #111;
        }

        .working-box {
            background: #000;
            padding: 40px;
            border-radius: 20px;
            display: inline-block;
            border: 1px dashed var(--primary-red);
        }

        .loading-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- الفوتر --- */
        footer {
            padding: 30px;
            text-align: center;
            border-top: 1px solid #333;
            color: var(--gray-text);
        }

        .hamza-signature {
            color: var(--primary-red);
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* للموبايل */
        @media (max-width: 768px) {
            .hero { flex-direction: column-reverse; text-align: center; padding-top: 100px; }
            .hero-text h1 { font-size: 2.5rem; }
            .profile-container { width: 250px; height: 250px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-text">
            <h1>أهلاً، أنا <span>حمزة</span></h1>
            <div class="typewriter" id="typewriter"></div>
        </div>
        <div class="hero-img">
            <div class="profile-container">
                <img src="hamza.png" alt="Hamza">
            </div>
        </div>
    </section>

    <section class="services">
        <h2 class="section-title">خدماتى </h2>
        <div class="services-grid">
            <div class="service-card">
                <i class="fas fa-mobile-alt"></i>
                <h3>إنشاء تطبيقات</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-code"></i>
                <h3>إنشاء مواقع</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-gamepad"></i>
                <h3>برمجة ألعاب</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-terminal"></i>
                <h3>برمجة سكريبتات</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-edit"></i>
                <h3>تعديل أكواد</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-bug"></i>
                <h3>إصلاح أخطاء</h3>
            </div>
            <div class="service-card">
                <i class="fas fa-language"></i>
                <h3>ترجمة أكواد</h3>
            </div>
        </div>
    </section>

    <section class="contact">
        <div class="working-box">
            <i class="fas fa-tools loading-icon"></i>
            <h3>قسم التواصل</h3>
            <p>جارى العمل عليها حالياً...</p>
        </div>
    </section>

    <footer>
        <p>© 2025 All Rights Reserved</p>
        <p>Programming by <span class="hamza-signature">HAMZA</span></p>
    </footer>

    <script>
        // تأثير الكتابة التدريجي
        const textElement = document.getElementById('typewriter');
        const phrases = ["مبرمج تطبيقات", "مطور مواقع ويب", "مطور ألعاب ", "خبير حلول برمجية"];
        let phraseIndex = 0;
        let charIndex = 0;

        function type() {
            if (charIndex < phrases[phraseIndex].length) {
                textElement.textContent += phrases[phraseIndex].charAt(charIndex);
                charIndex++;
                setTimeout(type, 100);
            } else {
                setTimeout(erase, 2000);
            }
        }

        function erase() {
            if (charIndex > 0) {
                textElement.textContent = phrases[phraseIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(erase, 50);
            } else {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                setTimeout(type, 500);
            }
        }

        document.addEventListener("DOMContentLoaded", type);
    </script>
</body>
</html>
